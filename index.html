<style>
:root{--app-height:100vh;--bg:#f4f0e7;--panel:#fffdf8;--ink:#22262c;--muted:#6d7480;--accent:#6f5434;--accent2:#d3a465;--line:#73502b;--board:#d8a65e;--good:#19764a;--bad:#b9382f;--gold:#d99b26;--shadow:0 18px 45px rgba(66,45,20,.14)}
*{box-sizing:border-box}body{margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:radial-gradient(circle at top left,#fffaf0,#eee6d7 60%,#e6ddcc);color:var(--ink);min-height:100vh}.app{min-height:100vh;padding-top:max(20px,env(safe-area-inset-top));padding-right:max(20px,env(safe-area-inset-right));padding-bottom:max(20px,env(safe-area-inset-bottom));padding-left:max(20px,env(safe-area-inset-left));display:grid;grid-template-columns:330px minmax(0,1fr);gap:20px;padding:20px}.panel,.workspace{background:rgba(255,253,248,.94);border:1px solid rgba(111,84,52,.17);border-radius:22px;box-shadow:var(--shadow)}.panel{padding:20px;display:flex;flex-direction:column;gap:18px;position:sticky;top:20px;height:calc(100vh - 40px);overflow:auto}.brand{display:flex;align-items:center;gap:12px}.logo{width:48px;height:48px;border-radius:15px;background:linear-gradient(145deg,#1e1e1e,#555);display:grid;place-items:center;box-shadow:inset -5px -6px 10px #0008,0 7px 15px #0002;color:#fff;font-size:22px}.brand h1{font-size:1.45rem;margin:0}.brand p{margin:3px 0 0;color:var(--muted);font-size:.9rem}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.stat{padding:10px 8px;border-radius:13px;background:#f4ede1;text-align:center}.stat strong{display:block;font-size:1.08rem}.stat small{color:var(--muted)}.progress-row{display:flex;justify-content:space-between;font-size:.88rem;margin-bottom:7px}.progress{height:10px;border-radius:999px;background:#e8dfd1;overflow:hidden}.progress>div{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .35s}.tabs{display:grid;grid-template-columns:repeat(auto-fit,minmax(72px,1fr));gap:7px}.tab{border:1px solid #ddd0bd;background:#fffaf2;border-radius:11px;padding:9px 5px;font-weight:700;cursor:pointer}.tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}.map{display:grid;gap:10px}.chapter{border:1px solid #e3d7c5;background:#fffaf2;border-radius:15px;padding:12px;cursor:pointer;text-align:left;transition:.16s}.chapter:hover{transform:translateY(-1px);border-color:#ba9565}.chapter.active{border-color:var(--accent);background:#f2e5d2}.chapter.locked{opacity:.48;cursor:not-allowed}.chapter .top{display:flex;justify-content:space-between;align-items:center;font-weight:800}.chapter small{display:block;margin-top:4px;color:var(--muted);line-height:1.35}.badge{font-size:.75rem;border-radius:999px;padding:3px 8px;background:#eadcc8}.workspace{padding:22px;display:grid;grid-template-columns:minmax(380px,720px) minmax(300px,1fr);gap:24px;align-items:start}.board-column{display:flex;flex-direction:column;gap:13px}.board-top{display:flex;justify-content:space-between;align-items:center;gap:10px}.board-top h2{margin:0;font-size:1.1rem}.board-size{padding:6px 10px;border-radius:999px;background:#eee4d4;font-weight:800;font-size:.82rem}.board{position:relative;width:min(64vw,680px);aspect-ratio:1;background:var(--board);border:10px solid #865c30;border-radius:19px;box-shadow:inset 0 0 0 1px #ffffff55,0 14px 30px #49311633;overflow:hidden;user-select:none}.line{position:absolute;background:var(--line);opacity:.92;pointer-events:none}.line.h{height:1px}.line.v{width:1px}.point{position:absolute;transform:translate(-50%,-50%);border:0;background:transparent;border-radius:50%;cursor:pointer;padding:0;z-index:2}.point:after{content:"";position:absolute;inset:12%;border-radius:50%;opacity:0;background:#fff;transition:.14s;pointer-events:none}.point:hover:after{opacity:.24}.stone{position:absolute;inset:8%;border-radius:50%;pointer-events:none;z-index:3;animation:pop .16s ease-out}.stone.black{background:radial-gradient(circle at 35% 28%,#555,#111 62%,#000);box-shadow:inset -5px -6px 10px #0008,0 3px 5px #0005}.stone.white{background:radial-gradient(circle at 35% 28%,#fff,#e0e0e0 68%,#aaa);box-shadow:inset -4px -5px 10px #7775,0 3px 5px #0004}.point.hint{outline:4px solid #2e80ffbb;outline-offset:-2px;animation:pulse 1s infinite}
.glow-marker{position:absolute;inset:18%;border-radius:50%;background:rgba(58,137,255,.16);border:4px solid rgba(58,137,255,.9);box-shadow:0 0 0 8px rgba(58,137,255,.15),0 0 24px rgba(58,137,255,.75);z-index:5;pointer-events:none;animation:targetPulse 1.15s ease-in-out infinite}
.ghost-stone{position:absolute;inset:8%;border-radius:50%;pointer-events:none;z-index:4;opacity:.52;filter:saturate(.82);animation:ghostBreathe 1.15s ease-in-out infinite}.ghost-stone.black{background:radial-gradient(circle at 35% 28%,#666,#161616 62%,#000);box-shadow:inset -5px -6px 10px #0007,0 3px 8px #0005}.ghost-stone.white{background:radial-gradient(circle at 35% 28%,#fff,#e2e2e2 68%,#aaa);box-shadow:inset -4px -5px 10px #7774,0 3px 8px #0003}
.breath-marker{position:absolute;width:34%;height:34%;left:33%;top:33%;border-radius:50%;background:#2e80ff;border:2px solid #fff;box-shadow:0 0 0 5px rgba(46,128,255,.18),0 2px 8px #1235;z-index:5;pointer-events:none;animation:breathPulse 1.2s ease-in-out infinite}
.discovery{margin-top:14px;padding:14px;border-radius:13px;background:#edf5ff;border:1px solid #bed7ff;line-height:1.5;color:#244b78}.discovery strong{display:block;margin-bottom:4px;color:#173f6d}.point.correct{outline:5px solid #1b9a5bcc;outline-offset:-2px}.point.wrong{outline:5px solid #d34236cc;outline-offset:-2px}.territory-mark{position:absolute;inset:28%;border-radius:5px;background:#ffffffbb;z-index:4;pointer-events:none}.territory-mark.black{background:#222b}.territory-mark.white{background:#fff}.toolbar{display:flex;gap:9px;flex-wrap:wrap}.control{border:1px solid #cfbea5;background:#fffaf2;border-radius:11px;padding:10px 14px;font-weight:750;cursor:pointer}.control.primary{background:var(--accent);color:#fff;border-color:var(--accent)}.control:disabled{opacity:.45;cursor:not-allowed}.card{background:#fffaf1;border:1px solid #e7dac7;border-radius:18px;padding:21px;min-height:520px}.eyebrow{text-transform:uppercase;letter-spacing:.09em;font-size:.78rem;color:var(--accent);font-weight:850}.card h2{margin:8px 0 6px}.mission{color:var(--muted);font-size:.94rem}.prompt{margin:18px 0;padding:18px;border-radius:14px;background:#f1e8da;font-size:1.1rem;font-weight:750;line-height:1.5}.score-note{margin:-6px 0 18px;padding:14px 16px;border-radius:13px;background:#fff;border:1px solid #e2d3bd;display:grid;gap:7px}.score-line{color:#4f5661}.score-line.total{margin-top:3px;padding-top:9px;border-top:1px solid #ded2c0;font-weight:850;color:var(--ink)}.story{padding:12px 14px;border-left:4px solid var(--accent2);background:#fff6e9;border-radius:10px;color:#4c4339;line-height:1.5}.feedback{min-height:65px;margin:15px 0;padding:13px;border-radius:12px;background:#f4eee5;line-height:1.45}.feedback.good{color:var(--good);background:#eaf5ef}.feedback.bad{color:var(--bad);background:#fff0ee}.actions{display:flex;gap:9px;flex-wrap:wrap}.mini{font-size:.88rem;color:var(--muted);line-height:1.5}.why{margin-top:14px;padding:14px;border-radius:13px;background:#ece4d7;display:none;line-height:1.55}.why.show{display:block}.why-close{float:right;margin:-6px -6px 8px 10px;border:0;background:#f1e8da;border-radius:999px;width:34px;height:34px;font-weight:900;font-size:1.05rem;line-height:1;cursor:pointer;color:var(--ink)}.why-close:active{transform:scale(.96)}.pattern-list{display:grid;gap:10px}.pattern-card{padding:13px;border-radius:13px;border:1px solid #e0d4c2;background:#fffaf2;display:flex;justify-content:space-between;gap:10px}.pattern-card.locked{opacity:.45}.daily{display:grid;gap:11px}.daily-item{padding:13px;background:#fffaf2;border:1px solid #e3d6c3;border-radius:13px}.coach-card{padding:13px;background:#fffaf2;border:1px solid #e3d6c3;border-radius:13px;line-height:1.45}.coach-card strong{display:block;margin-bottom:5px}.coach-chip{display:inline-block;margin:3px 4px 0 0;padding:4px 8px;border-radius:999px;background:#eee4d4;font-size:.78rem;font-weight:800}.xp-pop{position:fixed;right:30px;top:30px;padding:12px 16px;border-radius:999px;background:#222;color:#fff;font-weight:800;opacity:0;transform:translateY(-10px);transition:.25s;z-index:99}.xp-pop.show{opacity:1;transform:translateY(0)}@keyframes pop{from{transform:scale(.65);opacity:.3}to{transform:scale(1);opacity:1}}@keyframes pulse{50%{box-shadow:0 0 0 10px #2e80ff22}}@keyframes targetPulse{50%{transform:scale(1.18);box-shadow:0 0 0 12px rgba(58,137,255,.08),0 0 32px rgba(58,137,255,.9)}}@keyframes breathPulse{50%{transform:scale(1.2);opacity:.72}}@keyframes ghostBreathe{50%{opacity:.72;transform:scale(.94)}}@media(max-width:1050px){.app{grid-template-columns:1fr}.panel{position:static;height:auto}.workspace{grid-template-columns:1fr}.board{width:100%}}@media(max-width:620px){.app{padding-top:max(10px,env(safe-area-inset-top));padding-right:max(10px,env(safe-area-inset-right));padding-bottom:max(10px,env(safe-area-inset-bottom));padding-left:max(10px,env(safe-area-inset-left)).workspace,.panel{padding:14px}.stats{grid-template-columns:repeat(3,1fr)}.board{border-width:7px}}

.mobile-header{display:none}.drawer-backdrop{display:none}.menu-btn,.lesson-toggle{border:1px solid #d8c8b0;background:#fffaf2;color:var(--ink);border-radius:12px;font-weight:800;cursor:pointer}.menu-btn{width:44px;height:44px;font-size:1.2rem}.mobile-title{display:flex;align-items:center;gap:10px;font-weight:850}.mobile-title .mini-logo{width:34px;height:34px;border-radius:11px;background:linear-gradient(145deg,#1e1e1e,#555);display:grid;place-items:center;color:#fff}.mobile-progress{font-size:.78rem;color:var(--muted);font-weight:750}.lesson-handle{display:none}
@media(max-width:1050px){
 body{overflow:hidden;background:#f5efe5;height:var(--app-height)}.app{display:block;height:var(--app-height);min-height:0;padding:0}.mobile-header{display:flex;position:fixed;left:0;right:0;top:0;height:calc(62px + env(safe-area-inset-top));padding:env(safe-area-inset-top) 12px 0;align-items:center;justify-content:space-between;background:rgba(255,253,248,.97);border-bottom:1px solid #e5d9c7;z-index:80;backdrop-filter:blur(14px)}
 .panel{position:fixed;z-index:100;left:0;top:0;bottom:0;width:min(88vw,360px);height:100dvh;border-radius:0 22px 22px 0;padding-top:max(22px,env(safe-area-inset-top));transform:translateX(-105%);transition:transform .25s ease;box-shadow:0 0 40px rgba(40,28,14,.28)}.panel.open{transform:translateX(0)}
 .drawer-backdrop{display:block;position:fixed;inset:0;background:rgba(25,18,10,.38);opacity:0;pointer-events:none;transition:opacity .2s;z-index:90}.drawer-backdrop.show{opacity:1;pointer-events:auto}
 .workspace{position:fixed;left:0;right:0;top:calc(62px + env(safe-area-inset-top));height:calc(var(--app-height) - 62px - env(safe-area-inset-top) - env(safe-area-inset-bottom));border:0;border-radius:0;box-shadow:none;padding:8px 10px;display:grid;grid-template-columns:1fr;grid-template-rows:minmax(0,1fr) auto;gap:6px;overflow:hidden;background:transparent}
 .board-column{min-height:0;display:grid;grid-template-rows:auto minmax(0,1fr) auto;gap:8px;align-items:center;justify-items:center}.board-top{width:min(100%,720px);padding:0 2px}.board-top h2{font-size:.92rem}.board-size{font-size:.75rem;padding:5px 9px}
 .board{width:min(calc(100vw - 26px),calc(var(--app-height) - 390px));max-width:720px;max-height:calc(var(--app-height) - 390px);border-width:7px;border-radius:16px;align-self:center}

 .card h2{font-size:1.02rem;margin:3px 0 6px;line-height:1.12}.eyebrow,.mission{display:none}.story{display:none}.prompt{margin:8px 0;padding:11px 12px;font-size:.95rem;line-height:1.36}.feedback{min-height:0;margin:8px 0;padding:9px 10px;font-size:.88rem;line-height:1.32;max-height:52px;overflow:hidden}.actions{gap:7px}.card>.actions .control{padding:9px 13px}.mini{display:none}.why.show{display:block;position:fixed;left:12px;right:12px;bottom:calc(12px + env(safe-area-inset-bottom));z-index:120;max-height:55vh;overflow:auto;background:#fffaf1;border:1px solid #d9c7ad;box-shadow:0 20px 55px rgba(45,30,14,.3)}.discovery,.score-note{font-size:.86rem;margin-top:8px}.score-note{padding:10px 11px;gap:4px}.lesson-handle{display:block;width:46px;height:5px;border-radius:99px;background:#d4c6b3;margin:-5px auto 7px}
 .xp-pop{right:12px;top:calc(68px + env(safe-area-inset-top))}
}

@media(orientation:landscape) and (max-height:600px){.workspace{grid-template-columns:minmax(0,1fr) minmax(280px,38vw);grid-template-rows:1fr}.board{width:min(calc(100dvh - 105px),58vw);max-height:calc(100dvh - 105px)}.card{max-height:100%;height:100%;border-radius:18px}.board-column{height:100%}}

<body>
<div class="xp-pop" id="xpPop">+10 XP</div>
<header class="mobile-header">
  <button class="menu-btn" id="menuBtn" aria-label="Open journey menu">☰</button>
  <div class="mobile-title"><span class="mini-logo">●</span><span>Go Journey</span></div>
  <div class="mobile-progress" id="mobileProgress">0%</div>
</header>
<div class="drawer-backdrop" id="drawerBackdrop"></div>
<div class="app">
<aside class="panel">
  <div class="brand"><div class="logo">●</div><div><h1>Go Journey</h1><p>Discover one pattern at a time.</p></div></div>
  <div class="stats"><div class="stat"><strong id="xpStat">0</strong><small>XP</small></div><div class="stat"><strong id="streakStat">1</strong><small>streak</small></div><div class="stat"><strong id="patternStat">0</strong><small>patterns</small></div></div>
  <div><div class="progress-row"><span>Journey progress</span><strong id="progressText">0%</strong></div><div class="progress"><div id="progressBar"></div></div></div>
  <div class="tabs"><button class="tab active" data-tab="journey">Journey</button><button class="tab" data-tab="patterns">Patterns</button><button class="tab" data-tab="daily">Daily</button><button class="tab" data-tab="coach">Coach</button></div>
  <div id="sideContent"></div>
</aside>
<main class="workspace">
<section class="board-column">
  <div class="board-top"><h2 id="boardTitle">Training board</h2><span class="board-size" id="boardSizeLabel">9 × 9</span></div>
  <div class="board" id="board" aria-label="Go training board"></div>
  <div class="toolbar"><button class="control" id="resetBtn">Reset puzzle</button><button class="control" id="hintBtn">Show hint</button><button class="control" id="demoBtn">Play it out</button></div>
</section>
<section class="card" id="lessonCard"><div class="lesson-handle"></div></section>
</main>
</div>
<script>
function setAppHeight(){document.documentElement.style.setProperty('--app-height', window.innerHeight + 'px')}
setAppHeight();
window.addEventListener('resize', setAppHeight);
window.addEventListener('orientationchange', () => setTimeout(setAppHeight, 250));
const puzzles=[
{id:'first',chapter:'Foundations',title:'Your First Stone',pattern:'Placement',size:9,story:'The board is empty. Every game begins with one quiet decision.',prompt:'Place a black stone on the bright blue intersection.',stones:[],answers:[[5,5]],glow:[[5,5]],why:'Go stones are placed on the crossing points of the lines, called intersections, rather than inside the squares.',explain:'Beautiful. Your first stone is on the board.',discover:'A stone stays on its intersection unless it is captured.',xp:10},
{id:'breathing',chapter:'Foundations',title:'Where Can It Breathe?',pattern:'Breathing spaces',size:9,story:'Your stone survives through the empty points that touch it.',prompt:'Tap all four blue breathing spaces around the black stone.',stones:[[5,5,'black']],answers:[[4,5],[6,5],[5,4],[5,6]],glow:[[4,5],[6,5],[5,4],[5,6]],marker:'breath',multi:true,why:'Only the empty intersections directly above, below, left, and right help the stone breathe. Diagonal points do not touch it.',explain:'Exactly. You found all four breathing spaces.',discover:'You understood the idea before learning its Go name.',xp:15},
{id:'liberty-name',chapter:'Foundations',title:'Meet the Liberty',pattern:'Liberties',size:9,story:'Go players have a special name for each breathing space.',prompt:'Tap one blue breathing space. Each such point is called a liberty.',stones:[[5,5,'black']],answers:[[4,5],[6,5],[5,4],[5,6]],glow:[[4,5],[6,5],[5,4],[5,6]],marker:'breath',any:true,why:'A liberty is an empty intersection directly touching a stone or connected group. Diagonals never count as liberties.',explain:'Correct. You have discovered a liberty.',discover:'New pattern unlocked: LIBERTY',xp:15},
{id:'count3',chapter:'Foundations',title:'One Breath Is Blocked',pattern:'Counting liberties',size:9,story:'White occupies one of Black’s breathing spaces.',prompt:'How many liberties does the black stone have now?',stones:[[5,5,'black'],[4,5,'white']],answers:[],choices:['2','3','4'],correctChoice:1,why:'The black stone originally had four liberties. White filled the upper one, leaving the points below, left, and right.',explain:'Yes. Black has three liberties remaining.',discover:'Liberties can disappear one at a time.',xp:15},
{id:'capture1',chapter:'Capture',title:'Take the Final Breath',pattern:'Capture',size:9,story:'White has only one liberty left.',prompt:'Play on the glowing point to remove the white stone.',stones:[[5,5,'white'],[4,5,'black'],[5,4,'black'],[5,6,'black']],answers:[[6,5]],glow:[[6,5]],capture:[[5,5]],why:'A stone with no liberties is captured and removed. Black fills White’s last liberty below the stone.',explain:'Captured. White has no breathing space left.',discover:'New pattern unlocked: CAPTURE',xp:20},
{id:'atari-experience',chapter:'Capture',title:'The Warning Before Capture',pattern:'Atari',size:9,story:'White still survives, but only just.',prompt:'Play a move that leaves the white stone with one liberty.',stones:[[5,5,'white'],[4,5,'black'],[5,4,'black']],answers:[[5,6],[6,5]],any:true,why:'Either move fills one of White’s two liberties, leaving exactly one. A stone or group with one liberty is in atari.',explain:'White has one liberty left. Go players call this atari.',discover:'Experience first, vocabulary second: ATARI',xp:20},
{id:'connect',chapter:'Shape',title:'Bridge the Gap',pattern:'Connection',size:9,story:'Two separated stones can be attacked independently.',prompt:'Connect the two black stones by playing between them.',stones:[[5,4,'black'],[5,6,'black']],answers:[[5,5]],glow:[[5,5]],why:'The new stone touches both existing stones, turning three stones into one connected group that shares liberties.',explain:'Connected. The stones now support one another.',discover:'New pattern unlocked: CONNECTION',xp:15},
{id:'eyes',chapter:'Life & Death',title:'Make the Second Eye',pattern:'Two eyes',size:9,story:'A surrounded group needs two separate safe spaces to live.',prompt:'Play the glowing move that completes Black’s second eye.',stones:[[2,2,'black'],[2,3,'black'],[2,4,'black'],[3,2,'black'],[3,4,'black'],[4,2,'black'],[4,3,'black'],[4,4,'black'],[2,6,'black'],[2,7,'black'],[2,8,'black'],[3,6,'black'],[3,8,'black'],[4,6,'black'],[4,8,'black']],answers:[[4,7]],glow:[[4,7]],why:'The left enclosure is already one eye. Closing the lower side of the right enclosure creates a second independent eye.',explain:'Alive. White cannot capture a group with two true eyes.',discover:'New pattern unlocked: TWO EYES',xp:25},
{id:'territory',chapter:'Scoring',title:'Who Owns the Empty Point?',pattern:'Territory',size:9,story:'Some empty space is valuable because one colour safely surrounds it.',prompt:'Tap the enclosed empty point.',stones:[[4,4,'black'],[4,5,'black'],[4,6,'black'],[5,4,'black'],[5,6,'black'],[6,4,'black'],[6,5,'black'],[6,6,'black']],answers:[[5,5]],glow:[[5,5]],why:'The empty centre point is fully enclosed by Black. Enclosed empty space is called territory.',explain:'Correct. This point belongs to Black.',discover:'New pattern unlocked: TERRITORY',xp:20,territory:[[5,5,'black']]},
{id:'komi',chapter:'Scoring',title:'White’s Starting Bonus',pattern:'Komi',size:9,story:'On this simple teaching board, White has one visible stone worth 1 board point. Black moved first, so White also receives a fixed 6.5-point balancing bonus.',prompt:'White has 1 point shown on the board. Add White’s 6.5-point bonus. What is White’s total?',stones:[[2,2,'black'],[7,7,'white']],answers:[],choices:['1','7.5','6.5'],correctChoice:1,choiceFeedback:'Start with the 1 visible white stone, then add the separate 6.5-point bonus: 1 + 6.5.',why:'The white stone provides the 1 board point you can see. The extra 6.5 points do not come from a stone or territory. They are a fixed balancing bonus given to White because Black plays first. Go players call this bonus komi; the half point prevents a tie.',explain:'Correct. 1 visible board point + 6.5 komi = 7.5 points.',discover:'New pattern unlocked: KOMI — a bonus, not a stone value.',xp:20,scoreNote:'Visible on board: 1 white stone = 1 point|Added separately: White’s bonus = +6.5|Final total: 7.5'},
{id:'ladder',chapter:'Pattern Lab',title:'The Ladder Begins',pattern:'Ladder',size:9,story:'A forced chase can repeat like steps on a staircase.',prompt:'Play the glowing move that begins the chase.',stones:[[3,3,'white'],[2,3,'black'],[3,2,'black']],answers:[[4,3]],glow:[[4,3]],why:'This move puts White in atari and forces an extension. Repeating this rhythm produces a diagonal ladder toward the edge.',explain:'The ladder has begun.',discover:'New pattern unlocked: LADDER',xp:25},
{id:'cut',chapter:'Pattern Lab',title:'Find the Cut',pattern:'Cut',size:9,story:'Connected stones share strength. A cut keeps groups separate.',prompt:'Play the move that cuts between the two white stones.',stones:[[5,4,'white'],[5,6,'white'],[4,5,'black']],answers:[[5,5]],glow:[[5,5]],why:'Playing between the two white stones prevents them from joining into one group. A cut is a move that separates stones so they cannot share liberties easily.',explain:'Cut made. White now has two separate problems.',discover:'New pattern unlocked: CUT',xp:25},
{id:'net',chapter:'Pattern Lab',title:'The Quiet Trap',pattern:'Net',size:9,story:'Not every capture is a chase. Sometimes the best move builds a fence.',prompt:'Play the net move that blocks White from escaping upward.',stones:[[5,5,'white'],[4,4,'black'],[4,6,'black'],[6,5,'black']],answers:[[4,5]],glow:[[4,5]],why:'A net does not have to touch every liberty immediately. It limits the escape routes so the target stone cannot run freely.',explain:'The net is set. White is boxed in.',discover:'New pattern unlocked: NET',xp:25},
{id:'snapback',chapter:'Pattern Lab',title:'The Stone That Bites Back',pattern:'Snapback',size:9,story:'Sometimes letting one stone be captured creates a bigger capture next.',prompt:'Play the move that starts the snapback idea.',stones:[[5,5,'white'],[5,6,'white'],[4,5,'black'],[6,5,'black'],[4,6,'black']],answers:[[6,6]],glow:[[6,6]],why:'A snapback is a trap where the opponent may capture one stone, but doing so leaves their own stones with no escape. This puzzle introduces the shape, not the full fight yet.',explain:'Good. The snapback shape is on the board.',discover:'New pattern unlocked: SNAPBACK',xp:30},
{id:'false-eye',chapter:'Life & Death',title:'The Eye That Is Not Safe',pattern:'False eye',size:9,story:'Some empty spaces look like eyes but can be stolen because the surrounding stones are not truly connected.',prompt:'Tap the weak eye-shaped point.',stones:[[4,4,'black'],[4,5,'black'],[5,4,'black'],[6,5,'black'],[5,6,'black'],[6,6,'black'],[5,5,'white']],answers:[[5,5]],glow:[[5,5]],why:'This point looks like an eye, but White already occupies the cutting point inside the shape. Beginners often see the empty outline and miss that the group is not safely connected.',explain:'Exactly. Not every eye shape is a true eye.',discover:'New pattern unlocked: FALSE EYE',xp:30},
{id:'endgame-boundary',chapter:'Scoring',title:'The Last Useful Point',pattern:'Endgame boundary',size:9,story:'Near the end, players close borders so territory becomes clear.',prompt:'Play the boundary move that protects Black’s small corner territory.',stones:[[2,2,'black'],[2,3,'black'],[3,2,'black'],[3,4,'white'],[4,3,'white']],answers:[[3,3]],glow:[[3,3]],why:'This move closes the small corner shape. Endgame moves often look quiet, but they decide which empty points are counted as territory.',explain:'Boundary closed. Now the corner point is easier to count.',discover:'New pattern unlocked: ENDGAME BOUNDARY',xp:25},
{id:'nineteen',chapter:'19×19 Gate',title:'Same Truth, Bigger Board',pattern:'Scale awareness',size:19,story:'The board is larger, but local rules do not change.',prompt:'Capture the white corner stone by filling its last liberty.',stones:[[1,1,'white'],[1,2,'black']],answers:[[2,1]],glow:[[2,1]],capture:[[1,1]],why:'A corner stone has only two possible liberties. One is occupied, so filling the other captures it, even on a 19×19 board.',explain:'Captured. Your small-board knowledge travels with you.',discover:'19×19 unlocked. The landscape grew, not the rules.',xp:30}
];
const chapters=[
{name:'Foundations',desc:'Placement and liberties',unlock:0},
{name:'Capture',desc:'Capture and atari',unlock:4},
{name:'Shape',desc:'Connection and strength',unlock:6},
{name:'Life & Death',desc:'Eyes, false eyes, and survival',unlock:7},
{name:'Scoring',desc:'Territory, komi, and endgame',unlock:8},
{name:'Pattern Lab',desc:'Fischer-style tactical patterns',unlock:10},
{name:'19×19 Gate',desc:'Graduate to the full board',unlock:16}
];
let state=JSON.parse(localStorage.getItem('goJourneyState')||'null')||{completed:[],xp:0,streak:1,current:'first',misses:{}};
state.misses=state.misses||{};
let current=puzzles.find(p=>p.id===state.current)||puzzles[0],selected=[],attempts=0,tab='journey';
const board=document.getElementById('board'),card=document.getElementById('lessonCard');
function save(){localStorage.setItem('goJourneyState',JSON.stringify(state));updateStats()}
function updateStats(){document.getElementById('xpStat').textContent=state.xp;document.getElementById('streakStat').textContent=state.streak;document.getElementById('patternStat').textContent=state.completed.length;const pct=Math.round(state.completed.length/puzzles.length*100);document.getElementById('progressText').textContent=pct+'%';document.getElementById('progressBar').style.width=pct+'%';const mp=document.getElementById('mobileProgress');if(mp)mp.textContent=pct+'%';renderSide()}
function chapterUnlocked(ch){return state.completed.length>=ch.unlock}
function renderSide(){const root=document.getElementById('sideContent');if(tab==='journey'){root.className='map';root.innerHTML=chapters.map(ch=>{const unlocked=chapterUnlocked(ch),done=puzzles.filter(p=>p.chapter===ch.name).every(p=>state.completed.includes(p.id));return `<button class="chapter ${current.chapter===ch.name?'active':''} ${unlocked?'':'locked'}" data-ch="${ch.name}" ${unlocked?'':'disabled'}><div class="top"><span>${done?'✓ ':''}${ch.name}</span><span class="badge">${puzzles.filter(p=>p.chapter===ch.name&&state.completed.includes(p.id)).length}/${puzzles.filter(p=>p.chapter===ch.name).length}</span></div><small>${ch.desc}</small></button>`}).join('');root.querySelectorAll('[data-ch]').forEach(b=>b.onclick=()=>{const p=puzzles.find(x=>x.chapter===b.dataset.ch&&!state.completed.includes(x.id))||puzzles.find(x=>x.chapter===b.dataset.ch);loadPuzzle(p.id);closeDrawer()})}else if(tab==='patterns'){root.className='pattern-list';root.innerHTML=puzzles.map((p,i)=>`<div class="pattern-card ${state.completed.includes(p.id)?'':'locked'}"><div><strong>Pattern ${String(i+1).padStart(3,'0')}</strong><small style="display:block;color:var(--muted);margin-top:3px">${p.pattern}</small></div><span>${state.completed.includes(p.id)?'⭐':'🔒'}</span></div>`).join('')}else if(tab==='daily'){const weak=weakestPattern();root.className='daily';root.innerHTML=`<div class="daily-item"><strong>Today’s five-minute set</strong><p class="mini" style="display:block">1 review puzzle<br>1 new pattern<br>1 scoring check<br>1 boss puzzle</p></div><div class="daily-item"><strong>Adaptive note</strong><p class="mini" style="display:block">${weak?`Your coach noticed misses around <b>${weak}</b>. We will serve a nearby review puzzle.`:'Complete puzzles to reveal your weak patterns.'}</p></div><button class="chapter" id="dailyStart"><div class="top"><span>Start recommended puzzle</span><span class="badge">+XP</span></div><small>${nextRecommendedPuzzle().title}</small></button>`;document.getElementById('dailyStart').onclick=()=>{loadPuzzle(nextRecommendedPuzzle().id);closeDrawer()}}else{root.className='daily';const weak=weakestPattern();root.innerHTML=`<div class="coach-card"><strong>AI Coach v0</strong>This is a rule-based coach for now, not a live LLM. It watches mistakes, explains likely misconceptions, and recommends the next puzzle.</div><div class="coach-card"><strong>Current focus</strong>${coachInsight()}<div>${Object.entries(state.misses||{}).slice(0,5).map(([k,v])=>`<span class="coach-chip">${k}: ${v}</span>`).join('')||'<span class="coach-chip">No misses yet</span>'}</div></div><button class="chapter" id="coachStart"><div class="top"><span>Coach recommended next</span><span class="badge">${weak||'Start'}</span></div><small>${nextRecommendedPuzzle().title}</small></button>`;document.getElementById('coachStart').onclick=()=>{loadPuzzle(nextRecommendedPuzzle().id);closeDrawer()}}}
function coordsPct(i,size){return size===1?50:(6.25+(i-1)*(87.5/(size-1)))}
function buildBoard(){board.innerHTML='';const size=current.size;document.getElementById('boardSizeLabel').textContent=`${size} × ${size}`;document.getElementById('boardTitle').textContent=current.chapter+' discovery board';const margin=size===19?3.4:6.25,span=100-margin*2;for(let i=0;i<size;i++){const p=margin+(i/(size-1))*span;const h=document.createElement('div');h.className='line h';h.style.left=margin+'%';h.style.right=margin+'%';h.style.top=p+'%';board.appendChild(h);const v=document.createElement('div');v.className='line v';v.style.top=margin+'%';v.style.bottom=margin+'%';v.style.left=p+'%';board.appendChild(v)}const pointSize=size===19?4.7:9.2;for(let r=1;r<=size;r++)for(let c=1;c<=size;c++){const btn=document.createElement('button');btn.className='point';btn.style.width=pointSize+'%';btn.style.aspectRatio='1';btn.style.left=(margin+((c-1)/(size-1))*span)+'%';btn.style.top=(margin+((r-1)/(size-1))*span)+'%';btn.dataset.r=r;btn.dataset.c=c;btn.setAttribute('aria-label',`Intersection row ${r}, column ${c}`);btn.onclick=()=>handlePoint(r,c,btn);const s=current.stones.find(x=>x[0]===r&&x[1]===c);if(s){const stone=document.createElement('span');stone.className='stone '+s[2];btn.appendChild(stone)}if((current.glow||[]).some(x=>x[0]===r&&x[1]===c)){if(current.marker!=='breath'){const ghost=document.createElement('span');ghost.className='ghost-stone '+(current.toMove||'black');btn.appendChild(ghost)}const marker=document.createElement('span');marker.className=current.marker==='breath'?'breath-marker':'glow-marker';btn.appendChild(marker)}board.appendChild(btn)}if(current.territory)current.territory.forEach(([r,c,col])=>{const btn=getPoint(r,c);const m=document.createElement('span');m.className='territory-mark '+col;btn.appendChild(m)})}
function getPoint(r,c){return board.querySelector(`[data-r="${r}"][data-c="${c}"]`)}
function registerMiss(){state.misses=state.misses||{};state.misses[current.pattern]=(state.misses[current.pattern]||0)+1;save()}
function weakestPattern(){const entries=Object.entries(state.misses||{}).sort((a,b)=>b[1]-a[1]);return entries[0]?.[0]||''}
function nextRecommendedPuzzle(){const weak=weakestPattern();if(weak){const review=puzzles.find(p=>p.pattern===weak&&!state.completed.includes(p.id))||puzzles.find(p=>p.pattern===weak);if(review)return review}return puzzles.find(p=>!state.completed.includes(p.id))||puzzles[0]}
function coachInsight(){const weak=weakestPattern();if(!weak)return 'No pattern weakness detected yet. Miss a puzzle and I will start adapting the practice path.';if(/libert|Breathing|Atari/i.test(weak))return 'You may be mixing diagonal spaces with true touching points. Count only up, down, left, and right.';if(/Capture/i.test(weak))return 'Look for the opponent’s final empty touching point. Capture is about removing the last breath, not surrounding the whole board.';if(/Komi|Scoring|Endgame|Territory/i.test(weak))return 'Separate visible board points from bonuses. Every visible number should trace to stones or enclosed empty points.';if(/Connection|Cut/i.test(weak))return 'Ask whether the move joins groups together or keeps them apart. Shape puzzles are about relationships between stones.';return 'You are entering pattern-recognition territory. Try to name what the move changes before tapping.'}
function openCoachForPuzzle(){const box=document.getElementById('whyBox');box.innerHTML='<button class="why-close" type="button" aria-label="Close explanation" onclick="closeWhy()">×</button><strong>Coach note</strong><br>'+coachMessage()+'<br><br><strong>Practice plan</strong><br>'+coachInsight();box.classList.add('show')}
function whyHTML(title,body){return `<button class="why-close" type="button" aria-label="Close explanation" onclick="closeWhy()">×</button><strong>${title}</strong><br>${body}`}
function closeWhy(){document.getElementById('whyBox')?.classList.remove('show')}
function openWhy(){const box=document.getElementById('whyBox');box.innerHTML=whyHTML('Why it works',current.why);box.classList.add('show')}
function renderCard(){selected=[];attempts=0;card.innerHTML=`<div class="lesson-handle"></div><div class="eyebrow">${current.chapter} · ${current.pattern}</div><h2>${current.title}</h2><div class="mission">Discovery ${puzzles.indexOf(current)+1} of ${puzzles.length}</div><div class="story">${current.story}</div><div class="prompt">${current.prompt}</div>${current.scoreNote?`<div class="score-note">${current.scoreNote.split('|').map((line,i)=>`<div class="score-line ${i===2?'total':''}">${line}</div>`).join('')}</div>`:''}${current.choices?`<div class="actions">${current.choices.map((x,i)=>`<button class="control choice" data-choice="${i}">${x}</button>`).join('')}</div>`:''}<div class="feedback" id="feedback">${current.glow?.length?'Look for the blue marker on the board.':'Study the position, then make your choice.'}</div><div class="actions"><button class="control" id="whyBtn">Why?</button><button class="control" id="coachBtn">Coach</button><button class="control primary" id="continueBtn" disabled>Continue</button></div><div class="why" id="whyBox">${whyHTML('Why it works',current.why)}</div><div class="discovery" id="discoveryBox" style="display:none"><strong>Discovery made</strong><span></span></div><p class="mini">One new idea at a time. Go words appear only after the board has shown you what they mean.</p>`;document.getElementById('whyBtn').onclick=()=>{const box=document.getElementById('whyBox');box.classList.contains('show')?closeWhy():openWhy()};document.getElementById('coachBtn').onclick=()=>openCoachForPuzzle();document.getElementById('continueBtn').onclick=nextPuzzle;card.querySelectorAll('.choice').forEach(b=>b.onclick=()=>handleChoice(+b.dataset.choice))}
function feedback(text,type=''){const f=document.getElementById('feedback');f.textContent=text;f.className='feedback '+type}
function handlePoint(r,c,btn){if(document.getElementById('continueBtn').disabled===false)return;const hit=current.answers.some(a=>a[0]===r&&a[1]===c);if(current.multi){const key=r+','+c;if(hit&&!selected.includes(key)){selected.push(key);btn.classList.add('correct');btn.querySelector('.breath-marker,.glow-marker')?.remove();if(selected.length===current.answers.length)complete();else feedback(`Good. ${current.answers.length-selected.length} breathing space${current.answers.length-selected.length===1?'':'s'} left to find.`,'good')}else{attempts++;registerMiss();btn.classList.add('wrong');setTimeout(()=>btn.classList.remove('wrong'),450);feedback(current.id==='breathing'?'That point does not directly touch the stone. Check only above, below, left, and right.':coachMessage(),'bad')}}else if(hit){btn.classList.add('correct');btn.querySelectorAll('.breath-marker,.glow-marker,.ghost-stone').forEach(el=>el.remove());if(!btn.querySelector('.stone')){const stone=document.createElement('span');stone.className='stone '+(current.toMove||'black');btn.appendChild(stone)}if(current.capture){current.capture.forEach(([rr,cc])=>{const p=getPoint(rr,cc);const s=p?.querySelector('.stone');if(s){s.style.transition='.35s';s.style.opacity='0';s.style.transform='scale(.2)';setTimeout(()=>s.remove(),350)}})}complete()}else{attempts++;registerMiss();btn.classList.add('wrong');setTimeout(()=>btn.classList.remove('wrong'),450);feedback(coachMessage(),'bad')}}
function coachMessage(){if(current.id==='first')return 'The target is the bright blue ring near the centre of the board.';if(current.pattern.includes('libert')||current.pattern==='Atari'||current.pattern==='Breathing spaces')return 'Check only the empty points directly above, below, left, and right. Diagonals are neighbours visually, but not liberties.';if(current.pattern==='Capture')return 'Find the one remaining empty point touching White. A capture happens when that final breath disappears.';if(current.pattern==='Connection')return 'Look for the single point directly touching both black stones. A connection lets them share breathing space.';if(current.pattern==='Cut')return 'Look for the point between the stones. A cut separates groups so they cannot easily help each other.';if(current.pattern==='Net')return 'Do not chase. Build the fence that stops the escape route.';if(current.pattern==='Snapback')return 'This is a trap shape. The first move sets up a bigger capture after the opponent bites.';if(current.pattern==='Komi')return 'Keep the visible board point separate from White’s fixed starting bonus: visible score plus 6.5.';return 'Try the blue-marked intersection. It is the idea this discovery is testing.'}
function handleChoice(i){card.querySelectorAll('.choice').forEach(x=>x.disabled=true);if(i===current.correctChoice)complete();else{attempts++;registerMiss();card.querySelectorAll('.choice')[i].style.borderColor='var(--bad)';feedback(current.choiceFeedback||'Not quite. Look again at what the question asks you to combine.','bad');setTimeout(()=>card.querySelectorAll('.choice').forEach(x=>x.disabled=false),700)}}
function complete(){feedback(current.explain,'good');document.getElementById('continueBtn').disabled=false;const d=document.getElementById('discoveryBox');if(current.discover&&d){d.style.display='block';d.querySelector('span').textContent=current.discover;}if(!state.completed.includes(current.id)){state.completed.push(current.id);state.xp+=current.xp;showXP(current.xp);save()}}
function showXP(xp){const e=document.getElementById('xpPop');e.textContent='+'+xp+' XP';e.classList.add('show');setTimeout(()=>e.classList.remove('show'),1300)}
function nextPuzzle(){const idx=puzzles.indexOf(current);const next=puzzles[idx+1]||puzzles[0];loadPuzzle(next.id)}
function loadPuzzle(id){current=puzzles.find(p=>p.id===id);state.current=id;save();buildBoard();renderCard()}
const panel=document.querySelector('.panel'),backdrop=document.getElementById('drawerBackdrop');
function openDrawer(){panel.classList.add('open');backdrop.classList.add('show');document.body.style.touchAction='none'}
function closeDrawer(){panel.classList.remove('open');backdrop.classList.remove('show');document.body.style.touchAction=''}
document.getElementById('menuBtn').onclick=openDrawer;backdrop.onclick=closeDrawer;document.addEventListener('keydown',e=>{if(e.key==='Escape')closeDrawer()});
document.getElementById('resetBtn').onclick=()=>loadPuzzle(current.id);document.getElementById('hintBtn').onclick=()=>{if(current.answers.length){const [r,c]=current.answers.find(a=>!selected.includes(a.join(',')))||current.answers[0];const p=getPoint(r,c);if(!p.querySelector('.glow-marker,.breath-marker')){if(current.marker!=='breath'&&!p.querySelector('.stone,.ghost-stone')){const g=document.createElement('span');g.className='ghost-stone '+(current.toMove||'black');p.appendChild(g)}const m=document.createElement('span');m.className=current.marker==='breath'?'breath-marker':'glow-marker';p.appendChild(m)}p.classList.add('hint');setTimeout(()=>p.classList.remove('hint'),2200)}else feedback('Hint: White’s total is board points plus komi.','good')};document.getElementById('demoBtn').onclick=()=>{openWhy();if(current.answers.length){const [r,c]=current.answers[0];const p=getPoint(r,c);if(!p.querySelector('.glow-marker,.breath-marker')){if(current.marker!=='breath'&&!p.querySelector('.stone,.ghost-stone')){const g=document.createElement('span');g.className='ghost-stone '+(current.toMove||'black');p.appendChild(g)}const m=document.createElement('span');m.className=current.marker==='breath'?'breath-marker':'glow-marker';p.appendChild(m)}p.classList.add('hint');setTimeout(()=>p.classList.remove('hint'),2200)}feedback('Watch the highlighted move, then read why the pattern works.','good')};document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{tab=b.dataset.tab;document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x===b));renderSide()});
updateStats();buildBoard();renderCard();
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('./service-worker.js').catch(() => {}));
}
</script>
