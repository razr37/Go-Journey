<style>
:root{--bg:#f4f0e7;--panel:#fffdf8;--ink:#22262c;--muted:#6d7480;--accent:#6f5434;--accent2:#d3a465;--line:#73502b;--board:#d8a65e;--good:#19764a;--bad:#b9382f;--gold:#d99b26;--shadow:0 18px 45px rgba(66,45,20,.14)}
*{box-sizing:border-box}body{margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:radial-gradient(circle at top left,#fffaf0,#eee6d7 60%,#e6ddcc);color:var(--ink);min-height:100vh}.app{min-height:100vh;padding-top:max(20px,env(safe-area-inset-top));padding-right:max(20px,env(safe-area-inset-right));padding-bottom:max(20px,env(safe-area-inset-bottom));padding-left:max(20px,env(safe-area-inset-left));display:grid;grid-template-columns:330px minmax(0,1fr);gap:20px;padding:20px}.panel,.workspace{background:rgba(255,253,248,.94);border:1px solid rgba(111,84,52,.17);border-radius:22px;box-shadow:var(--shadow)}.panel{padding:20px;display:flex;flex-direction:column;gap:18px;position:sticky;top:20px;height:calc(100vh - 40px);overflow:auto}.brand{display:flex;align-items:center;gap:12px}.logo{width:48px;height:48px;border-radius:15px;background:linear-gradient(145deg,#1e1e1e,#555);display:grid;place-items:center;box-shadow:inset -5px -6px 10px #0008,0 7px 15px #0002;color:#fff;font-size:22px}.brand h1{font-size:1.45rem;margin:0}.brand p{margin:3px 0 0;color:var(--muted);font-size:.9rem}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.stat{padding:10px 8px;border-radius:13px;background:#f4ede1;text-align:center}.stat strong{display:block;font-size:1.08rem}.stat small{color:var(--muted)}.progress-row{display:flex;justify-content:space-between;font-size:.88rem;margin-bottom:7px}.progress{height:10px;border-radius:999px;background:#e8dfd1;overflow:hidden}.progress>div{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .35s}.tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}.tab{border:1px solid #ddd0bd;background:#fffaf2;border-radius:11px;padding:9px 5px;font-weight:700;cursor:pointer}.tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}.map{display:grid;gap:10px}.chapter{border:1px solid #e3d7c5;background:#fffaf2;border-radius:15px;padding:12px;cursor:pointer;text-align:left;transition:.16s}.chapter:hover{transform:translateY(-1px);border-color:#ba9565}.chapter.active{border-color:var(--accent);background:#f2e5d2}.chapter.locked{opacity:.48;cursor:not-allowed}.chapter .top{display:flex;justify-content:space-between;align-items:center;font-weight:800}.chapter small{display:block;margin-top:4px;color:var(--muted);line-height:1.35}.badge{font-size:.75rem;border-radius:999px;padding:3px 8px;background:#eadcc8}.workspace{padding:22px;display:grid;grid-template-columns:minmax(380px,720px) minmax(300px,1fr);gap:24px;align-items:start}.board-column{display:flex;flex-direction:column;gap:13px}.board-top{display:flex;justify-content:space-between;align-items:center;gap:10px}.board-top h2{margin:0;font-size:1.1rem}.board-size{padding:6px 10px;border-radius:999px;background:#eee4d4;font-weight:800;font-size:.82rem}.board{position:relative;width:min(64vw,680px);aspect-ratio:1;background:var(--board);border:10px solid #865c30;border-radius:19px;box-shadow:inset 0 0 0 1px #ffffff55,0 14px 30px #49311633;overflow:hidden;user-select:none}.line{position:absolute;background:var(--line);opacity:.92;pointer-events:none}.line.h{height:1px}.line.v{width:1px}.point{position:absolute;transform:translate(-50%,-50%);border:0;background:transparent;border-radius:50%;cursor:pointer;padding:0;z-index:2}.point:after{content:"";position:absolute;inset:12%;border-radius:50%;opacity:0;background:#fff;transition:.14s;pointer-events:none}.point:hover:after{opacity:.24}.stone{position:absolute;inset:8%;border-radius:50%;pointer-events:none;z-index:3;animation:pop .16s ease-out}.stone.black{background:radial-gradient(circle at 35% 28%,#555,#111 62%,#000);box-shadow:inset -5px -6px 10px #0008,0 3px 5px #0005}.stone.white{background:radial-gradient(circle at 35% 28%,#fff,#e0e0e0 68%,#aaa);box-shadow:inset -4px -5px 10px #7775,0 3px 5px #0004}.point.hint{outline:4px solid #2e80ffbb;outline-offset:-2px;animation:pulse 1s infinite}
.glow-marker{position:absolute;inset:18%;border-radius:50%;background:rgba(58,137,255,.16);border:4px solid rgba(58,137,255,.9);box-shadow:0 0 0 8px rgba(58,137,255,.15),0 0 24px rgba(58,137,255,.75);z-index:5;pointer-events:none;animation:targetPulse 1.15s ease-in-out infinite}
.ghost-stone{position:absolute;inset:8%;border-radius:50%;pointer-events:none;z-index:4;opacity:.52;filter:saturate(.82);animation:ghostBreathe 1.15s ease-in-out infinite}.ghost-stone.black{background:radial-gradient(circle at 35% 28%,#666,#161616 62%,#000);box-shadow:inset -5px -6px 10px #0007,0 3px 8px #0005}.ghost-stone.white{background:radial-gradient(circle at 35% 28%,#fff,#e2e2e2 68%,#aaa);box-shadow:inset -4px -5px 10px #7774,0 3px 8px #0003}
.breath-marker{position:absolute;width:34%;height:34%;left:33%;top:33%;border-radius:50%;background:#2e80ff;border:2px solid #fff;box-shadow:0 0 0 5px rgba(46,128,255,.18),0 2px 8px #1235;z-index:5;pointer-events:none;animation:breathPulse 1.2s ease-in-out infinite}
.discovery{margin-top:14px;padding:14px;border-radius:13px;background:#edf5ff;border:1px solid #bed7ff;line-height:1.5;color:#244b78}.discovery strong{display:block;margin-bottom:4px;color:#173f6d}.point.correct{outline:5px solid #1b9a5bcc;outline-offset:-2px}.point.wrong{outline:5px solid #d34236cc;outline-offset:-2px}.territory-mark{position:absolute;inset:28%;border-radius:5px;background:#ffffffbb;z-index:4;pointer-events:none}.territory-mark.black{background:#222b}.territory-mark.white{background:#fff}.toolbar{display:flex;gap:9px;flex-wrap:wrap}.control{border:1px solid #cfbea5;background:#fffaf2;border-radius:11px;padding:10px 14px;font-weight:750;cursor:pointer}.control.primary{background:var(--accent);color:#fff;border-color:var(--accent)}.control:disabled{opacity:.45;cursor:not-allowed}.card{background:#fffaf1;border:1px solid #e7dac7;border-radius:18px;padding:21px;min-height:520px}.eyebrow{text-transform:uppercase;letter-spacing:.09em;font-size:.78rem;color:var(--accent);font-weight:850}.card h2{margin:8px 0 6px}.mission{color:var(--muted);font-size:.94rem}.prompt{margin:18px 0;padding:18px;border-radius:14px;background:#f1e8da;font-size:1.1rem;font-weight:750;line-height:1.5}.score-note{margin:-6px 0 18px;padding:14px 16px;border-radius:13px;background:#fff;border:1px solid #e2d3bd;display:grid;gap:7px}.score-line{color:#4f5661}.score-line.total{margin-top:3px;padding-top:9px;border-top:1px solid #ded2c0;font-weight:850;color:var(--ink)}.story{padding:12px 14px;border-left:4px solid var(--accent2);background:#fff6e9;border-radius:10px;color:#4c4339;line-height:1.5}.feedback{min-height:65px;margin:15px 0;padding:13px;border-radius:12px;background:#f4eee5;line-height:1.45}.feedback.good{color:var(--good);background:#eaf5ef}.feedback.bad{color:var(--bad);background:#fff0ee}.actions{display:flex;gap:9px;flex-wrap:wrap}.mini{font-size:.88rem;color:var(--muted);line-height:1.5}.why{margin-top:14px;padding:14px;border-radius:13px;background:#ece4d7;display:none;line-height:1.55}.why.show{display:block}.pattern-list{display:grid;gap:10px}.pattern-card{padding:13px;border-radius:13px;border:1px solid #e0d4c2;background:#fffaf2;display:flex;justify-content:space-between;gap:10px}.pattern-card.locked{opacity:.45}.daily{display:grid;gap:11px}.daily-item{padding:13px;background:#fffaf2;border:1px solid #e3d6c3;border-radius:13px}.xp-pop{position:fixed;right:30px;top:30px;padding:12px 16px;border-radius:999px;background:#222;color:#fff;font-weight:800;opacity:0;transform:translateY(-10px);transition:.25s;z-index:99}.xp-pop.show{opacity:1;transform:translateY(0)}@keyframes pop{from{transform:scale(.65);opacity:.3}to{transform:scale(1);opacity:1}}@keyframes pulse{50%{box-shadow:0 0 0 10px #2e80ff22}}@keyframes targetPulse{50%{transform:scale(1.18);box-shadow:0 0 0 12px rgba(58,137,255,.08),0 0 32px rgba(58,137,255,.9)}}@keyframes breathPulse{50%{transform:scale(1.2);opacity:.72}}@keyframes ghostBreathe{50%{opacity:.72;transform:scale(.94)}}@media(max-width:1050px){.app{grid-template-columns:1fr}.panel{position:static;height:auto}.workspace{grid-template-columns:1fr}.board{width:100%}}@media(max-width:620px){.app{padding-top:max(10px,env(safe-area-inset-top));padding-right:max(10px,env(safe-area-inset-right));padding-bottom:max(10px,env(safe-area-inset-bottom));padding-left:max(10px,env(safe-area-inset-left)).workspace,.panel{padding:14px}.stats{grid-template-columns:repeat(3,1fr)}.board{border-width:7px}}
</style>
</head>
<body>
<div class="xp-pop" id="xpPop">+10 XP</div>
<div class="app">
<aside class="panel">
  <div class="brand"><div class="logo">●</div><div><h1>Go Journey</h1><p>Discover one pattern at a time.</p></div></div>
  <div class="stats"><div class="stat"><strong id="xpStat">0</strong><small>XP</small></div><div class="stat"><strong id="streakStat">1</strong><small>streak</small></div><div class="stat"><strong id="patternStat">0</strong><small>patterns</small></div></div>
  <div><div class="progress-row"><span>Journey progress</span><strong id="progressText">0%</strong></div><div class="progress"><div id="progressBar"></div></div></div>
  <div class="tabs"><button class="tab active" data-tab="journey">Journey</button><button class="tab" data-tab="patterns">Patterns</button><button class="tab" data-tab="daily">Daily</button></div>
  <div id="sideContent"></div>
</aside>
<main class="workspace">
<section class="board-column">
  <div class="board-top"><h2 id="boardTitle">Training board</h2><span class="board-size" id="boardSizeLabel">9 × 9</span></div>
  <div class="board" id="board" aria-label="Go training board"></div>
  <div class="toolbar"><button class="control" id="resetBtn">Reset puzzle</button><button class="control" id="hintBtn">Show hint</button><button class="control" id="demoBtn">Play it out</button></div>
</section>
<section class="card" id="lessonCard"></section>
</main>
</div>
<script>
const puzzles=[
{id:'first',chapter:'Foundations',title:'Your First Stone',pattern:'Placement',size:9,story:'The board is empty. Every game begins with one quiet decision.',prompt:'Place a black stone on the bright blue intersection.',stones:[],answers:[[5,5]],glow:[[5,5]],why:'Go stones are placed on the crossing points of the lines, called intersections, rather than inside the squares.',explain:'Beautiful. Your first stone is on the board.',discover:'A stone stays on its intersection unless it is captured.',xp:10},
{id:'breathing',chapter:'Foundations',title:'Where Can It Breathe?',pattern:'Breathing spaces',size:9,story:'Your stone survives through the empty points that touch it.',prompt:'Tap all four blue breathing spaces around the black stone.',stones:[[5,5,'black']],answers:[[4,5],[6,5],[5,4],[5,6]],glow:[[4,5],[6,5],[5,4],[5,6]],marker:'breath',multi:true,why:'Only the empty intersections directly above, below, left, and right help the stone breathe. Diagonal points do not touch it.',explain:'Exactly. You found all four breathing spaces.',discover:'You understood the idea before learning its Go name.',xp:15},
{id:'liberty-name',chapter:'Foundations',title:'Meet the Liberty',pattern:'Liberties',size:9,story:'Go players have a special name for each breathing space.',prompt:'Tap one blue breathing space. Each such point is called a liberty.',stones:[[5,5,'black']],answers:[[4,5],[6,5],[5,4],[5,6]],glow:[[4,5],[6,5],[5,4],[5,6]],marker:'breath',any:true,why:'A liberty is an empty intersection directly touching a stone or connected group. Diagonals never count as liberties.',explain:'Correct. You have discovered a liberty.',discover:'New pattern unlocked: LIBERTY',xp:15},
{id:'count3',chapter:'Foundations',title:'One Breath Is Blocked',pattern:'Counting liberties',size:9,story:'White occupies one of Black’s breathing spaces.',prompt:'How many liberties does the black stone have now?',stones:[[5,5,'black'],[4,5,'white']],answers:[],choices:['2','3','4'],correctChoice:1,why:'The black stone originally had four liberties. White filled the upper one, leaving the points below, left, and right.',explain:'Yes. Black has three liberties remaining.',discover:'Liberties can disappear one at a time.',xp:15},
{id:'capture1',chapter:'Capture',title:'Take the Final Breath',pattern:'Capture',size:9,story:'White has only one liberty left.',prompt:'Play on the glowing point to remove the white stone.',stones:[[5,5,'white'],[4,5,'black'],[5,4,'black'],[5,6,'black']],answers:[[6,5]],glow:[[6,5]],capture:[[5,5]],why:'A stone with no liberties is captured and removed. Black fills White’s last liberty below the stone.',explain:'Captured. White has no breathing space left.',discover:'New pattern unlocked: CAPTURE',xp:20},
{id:'atari-experience',chapter:'Capture',title:'The Warning Before Capture',pattern:'Atari',size:9,story:'White still survives, but only just.',prompt:'Play a move that leaves the white stone with one liberty.',stones:[[5,5,'white'],[4,5,'black'],[5,4,'black']],answers:[[5,6],[6,5]],any:true,why:'Either move fills one of White’s two liberties, leaving exactly one. A stone or group with one liberty is in atari.',explain:'White has one liberty left. Go players call this atari.',discover:'Experience first, vocabulary second: ATARI',xp:20},
{id:'connect',chapter:'Shape',title:'Bridge the Gap',pattern:'Connection',size:9,story:'Two separated stones can be attacked independently.',prompt:'Connect the two black stones by playing between them.',stones:[[5,4,'black'],[5,6,'black']],answers:[[5,5]],glow:[[5,5]],why:'The new stone touches both existing stones, turning three stones into one connected group that shares liberties.',explain:'Connected. The stones now support one another.',discover:'New pattern unlocked: CONNECTION',xp:15},
{id:'eyes',chapter:'Life & Death',title:'Make the Second Eye',pattern:'Two eyes',size:9,story:'A surrounded group needs two separate safe spaces to live.',prompt:'Play the glowing move that completes Black’s second eye.',stones:[[2,2,'black'],[2,3,'black'],[2,4,'black'],[3,2,'black'],[3,4,'black'],[4,2,'black'],[4,3,'black'],[4,4,'black'],[2,6,'black'],[2,7,'black'],[2,8,'black'],[3,6,'black'],[3,8,'black'],[4,6,'black'],[4,8,'black']],answers:[[4,7]],glow:[[4,7]],why:'The left enclosure is already one eye. Closing the lower side of the right enclosure creates a second independent eye.',explain:'Alive. White cannot capture a group with two true eyes.',discover:'New pattern unlocked: TWO EYES',xp:25},
{id:'territory',chapter:'Scoring',title:'Who Owns the Empty Point?',pattern:'Territory',size:9,story:'Some empty space is valuable because one colour safely surrounds it.',prompt:'Tap the enclosed empty point.',stones:[[4,4,'black'],[4,5,'black'],[4,6,'black'],[5,4,'black'],[5,6,'black'],[6,4,'black'],[6,5,'black'],[6,6,'black']],answers:[[5,5]],glow:[[5,5]],why:'The empty centre point is fully enclosed by Black. Enclosed empty space is called territory.',explain:'Correct. This point belongs to Black.',discover:'New pattern unlocked: TERRITORY',xp:20,territory:[[5,5,'black']]},
{id:'komi',chapter:'Scoring',title:'White’s Starting Bonus',pattern:'Komi',size:9,story:'On this simple teaching board, White has one visible stone worth 1 board point. Black moved first, so White also receives a fixed 6.5-point balancing bonus.',prompt:'White has 1 point shown on the board. Add White’s 6.5-point bonus. What is White’s total?',stones:[[2,2,'black'],[7,7,'white']],answers:[],choices:['1','7.5','6.5'],correctChoice:1,choiceFeedback:'Start with the 1 visible white stone, then add the separate 6.5-point bonus: 1 + 6.5.',why:'The white stone provides the 1 board point you can see. The extra 6.5 points do not come from a stone or territory. They are a fixed balancing bonus given to White because Black plays first. Go players call this bonus komi; the half point prevents a tie.',explain:'Correct. 1 visible board point + 6.5 komi = 7.5 points.',discover:'New pattern unlocked: KOMI — a bonus, not a stone value.',xp:20,scoreNote:'Visible on board: 1 white stone = 1 point|Added separately: White’s bonus = +6.5|Final total: 7.5'},
{id:'ladder',chapter:'Pattern Lab',title:'The Ladder Begins',pattern:'Ladder',size:9,story:'A forced chase can repeat like steps on a staircase.',prompt:'Play the glowing move that begins the chase.',stones:[[3,3,'white'],[2,3,'black'],[3,2,'black']],answers:[[4,3]],glow:[[4,3]],why:'This move puts White in atari and forces an extension. Repeating this rhythm produces a diagonal ladder toward the edge.',explain:'The ladder has begun.',discover:'New pattern unlocked: LADDER',xp:25},
{id:'nineteen',chapter:'19×19 Gate',title:'Same Truth, Bigger Board',pattern:'Scale awareness',size:19,story:'The board is larger, but local rules do not change.',prompt:'Capture the white corner stone by filling its last liberty.',stones:[[1,1,'white'],[1,2,'black']],answers:[[2,1]],glow:[[2,1]],capture:[[1,1]],why:'A corner stone has only two possible liberties. One is occupied, so filling the other captures it, even on a 19×19 board.',explain:'Captured. Your small-board knowledge travels with you.',discover:'19×19 unlocked. The landscape grew, not the rules.',xp:30}
];
const chapters=[
{name:'Foundations',desc:'Placement and liberties',unlock:0},
{name:'Capture',desc:'Capture and atari',unlock:4},
{name:'Shape',desc:'Connection and strength',unlock:6},
{name:'Life & Death',desc:'Eyes and survival',unlock:7},
{name:'Scoring',desc:'Territory and komi',unlock:8},
{name:'Pattern Lab',desc:'Fischer-style tactical patterns',unlock:10},
{name:'19×19 Gate',desc:'Graduate to the full board',unlock:11}
];
let state=JSON.parse(localStorage.getItem('goJourneyState')||'null')||{completed:[],xp:0,streak:1,current:'first'};
let current=puzzles.find(p=>p.id===state.current)||puzzles[0],selected=[],attempts=0,tab='journey';
const board=document.getElementById('board'),card=document.getElementById('lessonCard');
function save(){localStorage.setItem('goJourneyState',JSON.stringify(state));updateStats()}
function updateStats(){document.getElementById('xpStat').textContent=state.xp;document.getElementById('streakStat').textContent=state.streak;document.getElementById('patternStat').textContent=state.completed.length;const pct=Math.round(state.completed.length/puzzles.length*100);document.getElementById('progressText').textContent=pct+'%';document.getElementById('progressBar').style.width=pct+'%';renderSide()}
function chapterUnlocked(ch){return state.completed.length>=ch.unlock}
function renderSide(){const root=document.getElementById('sideContent');if(tab==='journey'){root.className='map';root.innerHTML=chapters.map(ch=>{const unlocked=chapterUnlocked(ch),done=puzzles.filter(p=>p.chapter===ch.name).every(p=>state.completed.includes(p.id));return `<button class="chapter ${current.chapter===ch.name?'active':''} ${unlocked?'':'locked'}" data-ch="${ch.name}" ${unlocked?'':'disabled'}><div class="top"><span>${done?'✓ ':''}${ch.name}</span><span class="badge">${puzzles.filter(p=>p.chapter===ch.name&&state.completed.includes(p.id)).length}/${puzzles.filter(p=>p.chapter===ch.name).length}</span></div><small>${ch.desc}</small></button>`}).join('');root.querySelectorAll('[data-ch]').forEach(b=>b.onclick=()=>{const p=puzzles.find(x=>x.chapter===b.dataset.ch&&!state.completed.includes(x.id))||puzzles.find(x=>x.chapter===b.dataset.ch);loadPuzzle(p.id)})}else if(tab==='patterns'){root.className='pattern-list';root.innerHTML=puzzles.map((p,i)=>`<div class="pattern-card ${state.completed.includes(p.id)?'':'locked'}"><div><strong>Pattern ${String(i+1).padStart(3,'0')}</strong><small style="display:block;color:var(--muted);margin-top:3px">${p.pattern}</small></div><span>${state.completed.includes(p.id)?'⭐':'🔒'}</span></div>`).join('')}else{root.className='daily';root.innerHTML=`<div class="daily-item"><strong>Today’s five-minute set</strong><p class="mini">1 review puzzle<br>1 new pattern<br>1 scoring check<br>1 boss puzzle</p></div><div class="daily-item"><strong>Adaptive note</strong><p class="mini">${attempts>1?'We will add another puzzle similar to the one you missed.':'Complete puzzles to reveal your weak patterns.'}</p></div>`}}
function coordsPct(i,size){return size===1?50:(6.25+(i-1)*(87.5/(size-1)))}
function buildBoard(){board.innerHTML='';const size=current.size;document.getElementById('boardSizeLabel').textContent=`${size} × ${size}`;document.getElementById('boardTitle').textContent=current.chapter+' discovery board';const margin=size===19?3.4:6.25,span=100-margin*2;for(let i=0;i<size;i++){const p=margin+(i/(size-1))*span;const h=document.createElement('div');h.className='line h';h.style.left=margin+'%';h.style.right=margin+'%';h.style.top=p+'%';board.appendChild(h);const v=document.createElement('div');v.className='line v';v.style.top=margin+'%';v.style.bottom=margin+'%';v.style.left=p+'%';board.appendChild(v)}const pointSize=size===19?4.7:9.2;for(let r=1;r<=size;r++)for(let c=1;c<=size;c++){const btn=document.createElement('button');btn.className='point';btn.style.width=pointSize+'%';btn.style.aspectRatio='1';btn.style.left=(margin+((c-1)/(size-1))*span)+'%';btn.style.top=(margin+((r-1)/(size-1))*span)+'%';btn.dataset.r=r;btn.dataset.c=c;btn.setAttribute('aria-label',`Intersection row ${r}, column ${c}`);btn.onclick=()=>handlePoint(r,c,btn);const s=current.stones.find(x=>x[0]===r&&x[1]===c);if(s){const stone=document.createElement('span');stone.className='stone '+s[2];btn.appendChild(stone)}if((current.glow||[]).some(x=>x[0]===r&&x[1]===c)){if(current.marker!=='breath'){const ghost=document.createElement('span');ghost.className='ghost-stone '+(current.toMove||'black');btn.appendChild(ghost)}const marker=document.createElement('span');marker.className=current.marker==='breath'?'breath-marker':'glow-marker';btn.appendChild(marker)}board.appendChild(btn)}if(current.territory)current.territory.forEach(([r,c,col])=>{const btn=getPoint(r,c);const m=document.createElement('span');m.className='territory-mark '+col;btn.appendChild(m)})}
function getPoint(r,c){return board.querySelector(`[data-r="${r}"][data-c="${c}"]`)}
function renderCard(){selected=[];attempts=0;card.innerHTML=`<div class="eyebrow">${current.chapter} · ${current.pattern}</div><h2>${current.title}</h2><div class="mission">Discovery ${puzzles.indexOf(current)+1} of ${puzzles.length}</div><div class="story">${current.story}</div><div class="prompt">${current.prompt}</div>${current.scoreNote?`<div class="score-note">${current.scoreNote.split('|').map((line,i)=>`<div class="score-line ${i===2?'total':''}">${line}</div>`).join('')}</div>`:''}${current.choices?`<div class="actions">${current.choices.map((x,i)=>`<button class="control choice" data-choice="${i}">${x}</button>`).join('')}</div>`:''}<div class="feedback" id="feedback">${current.glow?.length?'Look for the blue marker on the board.':'Study the position, then make your choice.'}</div><div class="actions"><button class="control" id="whyBtn">Why?</button><button class="control primary" id="continueBtn" disabled>Continue</button></div><div class="why" id="whyBox"><strong>Why it works</strong><br>${current.why}</div><div class="discovery" id="discoveryBox" style="display:none"><strong>Discovery made</strong><span></span></div><p class="mini">One new idea at a time. Go words appear only after the board has shown you what they mean.</p>`;document.getElementById('whyBtn').onclick=()=>document.getElementById('whyBox').classList.toggle('show');document.getElementById('continueBtn').onclick=nextPuzzle;card.querySelectorAll('.choice').forEach(b=>b.onclick=()=>handleChoice(+b.dataset.choice))}
function feedback(text,type=''){const f=document.getElementById('feedback');f.textContent=text;f.className='feedback '+type}
function handlePoint(r,c,btn){if(document.getElementById('continueBtn').disabled===false)return;const hit=current.answers.some(a=>a[0]===r&&a[1]===c);if(current.multi){const key=r+','+c;if(hit&&!selected.includes(key)){selected.push(key);btn.classList.add('correct');btn.querySelector('.breath-marker,.glow-marker')?.remove();if(selected.length===current.answers.length)complete();else feedback(`Good. ${current.answers.length-selected.length} breathing space${current.answers.length-selected.length===1?'':'s'} left to find.`,'good')}else{attempts++;btn.classList.add('wrong');setTimeout(()=>btn.classList.remove('wrong'),450);feedback(current.id==='breathing'?'That point does not directly touch the stone. Check only above, below, left, and right.':coachMessage(),'bad')}}else if(hit){btn.classList.add('correct');btn.querySelectorAll('.breath-marker,.glow-marker,.ghost-stone').forEach(el=>el.remove());if(!btn.querySelector('.stone')){const stone=document.createElement('span');stone.className='stone '+(current.toMove||'black');btn.appendChild(stone)}if(current.capture){current.capture.forEach(([rr,cc])=>{const p=getPoint(rr,cc);const s=p?.querySelector('.stone');if(s){s.style.transition='.35s';s.style.opacity='0';s.style.transform='scale(.2)';setTimeout(()=>s.remove(),350)}})}complete()}else{attempts++;btn.classList.add('wrong');setTimeout(()=>btn.classList.remove('wrong'),450);feedback(coachMessage(),'bad')}}
function coachMessage(){if(current.id==='first')return 'The target is the bright blue ring near the centre of the board.';if(current.pattern.includes('libert')||current.pattern==='Atari')return 'Check only the empty points directly above, below, left, and right.';if(current.pattern==='Capture')return 'Find the one remaining empty point touching White.';if(current.pattern==='Connection')return 'Look for the single point directly touching both black stones.';return 'Try the blue-marked intersection. It is the idea this discovery is testing.'}
function handleChoice(i){card.querySelectorAll('.choice').forEach(x=>x.disabled=true);if(i===current.correctChoice)complete();else{attempts++;card.querySelectorAll('.choice')[i].style.borderColor='var(--bad)';feedback(current.choiceFeedback||'Not quite. Look again at what the question asks you to combine.','bad');setTimeout(()=>card.querySelectorAll('.choice').forEach(x=>x.disabled=false),700)}}
function complete(){feedback(current.explain,'good');document.getElementById('continueBtn').disabled=false;const d=document.getElementById('discoveryBox');if(current.discover&&d){d.style.display='block';d.querySelector('span').textContent=current.discover;}if(!state.completed.includes(current.id)){state.completed.push(current.id);state.xp+=current.xp;showXP(current.xp);save()}}
function showXP(xp){const e=document.getElementById('xpPop');e.textContent='+'+xp+' XP';e.classList.add('show');setTimeout(()=>e.classList.remove('show'),1300)}
function nextPuzzle(){const idx=puzzles.indexOf(current);const next=puzzles[idx+1]||puzzles[0];loadPuzzle(next.id)}
function loadPuzzle(id){current=puzzles.find(p=>p.id===id);state.current=id;save();buildBoard();renderCard()}
document.getElementById('resetBtn').onclick=()=>loadPuzzle(current.id);document.getElementById('hintBtn').onclick=()=>{if(current.answers.length){const [r,c]=current.answers.find(a=>!selected.includes(a.join(',')))||current.answers[0];const p=getPoint(r,c);if(!p.querySelector('.glow-marker,.breath-marker')){if(current.marker!=='breath'&&!p.querySelector('.stone,.ghost-stone')){const g=document.createElement('span');g.className='ghost-stone '+(current.toMove||'black');p.appendChild(g)}const m=document.createElement('span');m.className=current.marker==='breath'?'breath-marker':'glow-marker';p.appendChild(m)}p.classList.add('hint');setTimeout(()=>p.classList.remove('hint'),2200)}else feedback('Hint: White’s total is board points plus komi.','good')};document.getElementById('demoBtn').onclick=()=>{document.getElementById('whyBox').classList.add('show');if(current.answers.length){const [r,c]=current.answers[0];const p=getPoint(r,c);if(!p.querySelector('.glow-marker,.breath-marker')){if(current.marker!=='breath'&&!p.querySelector('.stone,.ghost-stone')){const g=document.createElement('span');g.className='ghost-stone '+(current.toMove||'black');p.appendChild(g)}const m=document.createElement('span');m.className=current.marker==='breath'?'breath-marker':'glow-marker';p.appendChild(m)}p.classList.add('hint');setTimeout(()=>p.classList.remove('hint'),2200)}feedback('Watch the highlighted move, then read why the pattern works.','good')};document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{tab=b.dataset.tab;document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x===b));renderSide()});
updateStats();buildBoard();renderCard();
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('./service-worker.js').catch(() => {}));
}
</script>
