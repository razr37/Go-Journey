services:
  - type: web
    name: go-journey
    runtime: static
    buildCommand: echo "Static Go Journey V2.0"
    staticPublishPath: .
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /service-worker.js
        name: Cache-Control
        value: no-cache
